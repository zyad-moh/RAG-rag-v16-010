services:
  - type: web
    name: fastapi-tutorial-career-ai
    runtime: python
    plan: free # Free tier: 512 MB RAM, spins down after 15 min inactivity

    rootDir: src
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --reload --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DATABASE_URL
        